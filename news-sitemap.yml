name: Generate News Sitemap

on:
  workflow_dispatch:
  schedule:
    - cron: "15 * * * *"
  push:
    branches:
      - main
      - master
    paths:
      - "generate_news_sitemap.py"
      - ".github/workflows/news-sitemap.yml"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate news-sitemap.xml
        env:
          SITE_URL: "https://albanyantree.com"
          SITEMAP_URL: "https://albanyantree.com/sitemap.xml"
          PUBLICATION_NAME: "Albany & Tree"
          PUBLICATION_LANGUAGE: "en"
          LOOKBACK_HOURS: "48"
          MAX_URLS: "1000"
          NEWS_URL_PATTERNS: "/insights/.+"
        run: python generate_news_sitemap.py

      - name: Commit updated sitemap
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update news-sitemap.xml"
          file_pattern: news-sitemap.xml
